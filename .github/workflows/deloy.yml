
name: Deloy tiddlywiki

on:
  push:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [15.x]

    steps:
    - uses: actions/checkout@v2
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }}
    - name: "Tiddlywiki install"
      run: |
        make install
        git config --global user.email "59302530+tqfx@users.noreply.github.com"
        git config --global user.name  "github-actions[bot]"
    - name: "Tiddlywiki deloy"
      run: |
        make deloy
